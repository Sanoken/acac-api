version: '3.8'

services:
  acac-api:
    build: .
    container_name: api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: ["node", "server.js"]
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
      
volumes:
  postgres_data:
